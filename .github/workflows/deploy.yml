name: Deploy to Cloudflare Pages

# Production deploys on every push to main; preview deploys for pull requests.
# This replaces Cloudflare's dashboard Git integration with a fully scripted,
# reproducible pipeline. Requires these repository secrets (Settings → Secrets
# and variables → Actions):
#   CLOUDFLARE_API_TOKEN   – token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  – 01d939951a06311abac670d7da5928ed
#   VITE_SUPABASE_URL      – https://tmejdmvlultcasxuejjl.supabase.co
#   VITE_SUPABASE_ANON_KEY – the Supabase publishable/anon key (safe to expose)

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_ENV: production
        run: npm run build

      # Idempotently create the Pages project on the first run; harmless afterwards.
      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@3 pages project create makeframe-prod --production-branch main || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # On main this is "main" (production); on a PR it's the source branch (preview).
          command: pages deploy dist --project-name=makeframe-prod --branch=${{ github.head_ref || github.ref_name }}
